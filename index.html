<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System v3.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; animation: fadeIn 0.2s; }
        .user { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        .admin { background: #007aff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #5856d6; align-self: flex-end; border-bottom-right-radius: 2px; font-style: italic; }
        .input-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2c2c2e; color: white; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; }
        #botBtn { position: fixed; top: 10px; right: 10px; z-index: 1000; display: none; padding: 5px 10px; border-radius: 10px; border: none; font-size: 11px; color: white; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <button id="botBtn">BOT: KAPALI</button>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Mesaj yazın..." autocomplete="off">
        <button id="sendBtn">Gönder</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAW-HC08psjB1ftH-EffGyswLRZ13O8KtY",
            databaseURL: "https://global-chat-fac7a-default-rtdb.firebaseio.com",
            projectId: "global-chat-fac7a",
            appId: "1:1058623951778:web:8e71710b3c4482071698fb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sohbetRef = db.ref("sohbet_odasi");
        const botRef = db.ref("bot_aktif");

        const isAdmin = window.location.hash === "#admin";
        const botBtn = document.getElementById("botBtn");
        const input = document.getElementById("msgInput");
        const chatBox = document.getElementById("chat");

        if(isAdmin) botBtn.style.display = "block";

        let botAktif = false;
        botRef.on("value", (snap) => {
            botAktif = snap.val() || false;
            botBtn.innerText = botAktif ? "BOT: AÇIK" : "BOT: KAPALI";
            botBtn.style.background = botAktif ? "#4cd964" : "#ff3b30";
        });

        botBtn.onclick = () => botRef.set(!botAktif);

        function send() {
            const text = input.value.trim();
            if(text) {
                sohbetRef.push({ text: text, role: isAdmin ? "admin" : "user" });
                input.value = "";
            }
        }

        document.getElementById("sendBtn").onclick = send;
        input.onkeypress = (e) => { if(e.key === "Enter") send(); };

        sohbetRef.on("child_added", (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.className = "msg " + data.role;
            div.innerText = data.text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Bot Cevabı (Sadece admin ekranı açıkken tetiklenir)
            if(botAktif && data.role === "user" && isAdmin) {
                setTimeout(() => {
                    const cevaplar = ["İsteğiniz alındı.", "Şu an meşgulüm.", "Sistem hatası: 404", "Veriler işleniyor..."];
                    const secilen = cevaplar[Math.floor(Math.random() * cevaplar.length)];
                    sohbetRef.push({ text: "[OTO]: " + secilen, role: "bot" });
                }, 1500);
            }
        });
    </script>
</body>
</html>
