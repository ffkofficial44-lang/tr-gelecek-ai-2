<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem v6.0 - Otonom AI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .user { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .admin { background: #007aff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #5856d6; align-self: flex-end; border-bottom-right-radius: 2px; font-style: italic; border: 1px solid #777; }
        .input-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2c2c2e; color: white; outline: none; }
        #sendBtn { background: #007aff; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; }
        #botBtn { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; display: none; padding: 15px; border: none; font-weight: bold; text-align: center; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <button id="botBtn">BOT DURUMU YÜKLENİYOR...</button>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Mesajınızı yazın..." autocomplete="off">
        <button id="sendBtn">GÖNDER</button>
    </div>

    <script>
        var config = {
            apiKey: "AIzaSyAW-HC08psjB1ftH-EffGyswLRZ13O8KtY",
            databaseURL: "https://global-chat-fac7a-default-rtdb.firebaseio.com",
            projectId: "global-chat-fac7a",
            appId: "1:1058623951778:web:8e71710b3c4482071698fb"
        };
        firebase.initializeApp(config);
        var db = firebase.database();
        
        var isAdmin = window.location.hash.includes("admin");
        var botBtn = document.getElementById("botBtn");
        var msgInput = document.getElementById("msgInput");
        var chatBox = document.getElementById("chat");
        var botAktif = false;

        if(isAdmin) { botBtn.style.display = "block"; }

        // Botun durumunu veritabanından al
        db.ref("bot_kontrol").on("value", function(snap) {
            botAktif = snap.val() || false;
            botBtn.innerText = botAktif ? "🤖 BOT: ŞU AN HERKESE CEVAP VERİYOR" : "😴 BOT: KAPALI (AÇMAK İÇİN TIKLA)";
            botBtn.style.background = botAktif ? "#4cd964" : "#ff3b30";
        });

        botBtn.onclick = function() { db.ref("bot_kontrol").set(!botAktif); };

        function gonder() {
            var text = msgInput.value.trim();
            if(text !== "") {
                db.ref("sohbet_odasi").push({
                    msg: text,
                    role: isAdmin ? "admin" : "user",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                msgInput.value = "";
            }
        }

        document.getElementById("sendBtn").onclick = gonder;
        msgInput.onkeypress = function(e) { if(e.keyCode == 13) gonder(); };

        // MESAJLARI DİNLE VE OTONOM BOT CEVABI VER
        db.ref("sohbet_odasi").on("child_added", function(snap) {
            var data = snap.val();
            var div = document.createElement("div");
            div.className = "msg " + data.role;
            div.innerText = (data.role === "bot" ? "🤖 " : "") + data.msg;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // BOT MANTIĞI: Bot açıksa ve mesaj kullanıcıdan geldiyse
            // 'isAdmin' kontrolünü kaldırdım, böylece sen olmasan da çalışır!
            if (botAktif && data.role === "user") {
                // Sadece son 5 saniye içinde atılan mesajlara cevap ver (sonsuz döngü olmasın diye)
                var simdi = Date.now();
                if (data.timestamp && (simdi - data.timestamp < 5000)) {
                    setTimeout(function() {
                        var trollCevaplar = [
                            "Sistem meşgul, daha sonra ağla.",
                            "IQ seviyen sistemimizi kasmaya başladı.",
                            "Şu an başka bir kurbanla ilgileniyorum.",
                            "Bane.",
                            "Bu mesajınız otomatik olarak çöpe atılmıştır.",
                            "Hackleniyorsun... %15 tamamlandı.",
                            "Lütfen daha zeki cümleler kurun.",
                            "Kes sesini ve beklemeye devam et."
                        ];
                        var secilen = trollCevaplar[Math.floor(Math.random() * trollCevaplar.length)];
                        
                        // Botun kendi kendine cevap vermesini engellemek için sadece 1 kere yazdır
                        db.ref("sohbet_odasi").push({
                            msg: secilen,
                            role: "bot",
                            timestamp: firebase.database.ServerValue.TIMESTAMP
                        });
                    }, 2000); // 2 saniye gecikme (gerçekçi görünsün)
                }
            }
        });
    </script>
</body>
</html>
