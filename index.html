<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Destek AI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; scroll-behavior: smooth; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        /* Kullanıcı Mesajı */
        .user { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        /* Admin (Senin) Mesajın */
        .admin { background: #007aff; align-self: flex-end; border-bottom-right-radius: 2px; }
        /* Bot Mesajı */
        .bot { background: #5856d6; align-self: flex-end; border-bottom-right-radius: 2px; font-style: italic; }
        
        .input-bar { position: fixed; bottom: 0; width: 100%; background: #121212; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #2c2c2e; color: white; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        /* Bot Kontrol Butonu (Sadece Sende Görünür) */
        #botBtn { position: fixed; top: 15px; right: 15px; z-index: 1000; display: none; padding: 8px 12px; border-radius: 12px; border: none; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <button id="botBtn">BOT: KAPALI</button>
    <div id="chat"></div>
    
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Sistemle konuşun..." autocomplete="off">
        <button id="sendBtn">Gönder</button>
    </div>

    <script>
        // SENİN GERÇEK VERİ TABANI BİLGİLERİN
        const firebaseConfig = {
            apiKey: "AIzaSyAW-HC08psjB1ftH-EffGyswLRZ13O8KtY",
            databaseURL: "https://global-chat-fac7a-default-rtdb.firebaseio.com",
            projectId: "global-chat-fac7a",
            appId: "1:1058623951778:web:8e71710b3c4482071698fb"
        };

        // Firebase Başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sohbetRef = db.ref("sohbet_odasi");
        const botRef = db.ref("bot_aktif_durumu");

        const isAdmin = window.location.hash === "#admin";
        const botBtn = document.getElementById("botBtn");
        const input = document.getElementById("msgInput");
        const chatBox = document.getElementById("chat");

        if(isAdmin) botBtn.style.display = "block";

        // Bot Durumunu Dinle
        let botAktif = false;
        botRef.on("value", (snap) => {
            botAktif = snap.val() || false;
            botBtn.innerText = botAktif ? "🤖 BOT: AÇIK" : "🤖 BOT: KAPALI";
            botBtn.style.background = botAktif ? "#34c759" : "#ff3b30";
        });

        botBtn.onclick = () => botRef.set(!botAktif);

        // Mesaj Gönder
        function send() {
            const val = input.value.trim();
            if(val) {
                sohbetRef.push({
                    text: val,
                    role: isAdmin ? "admin" : "user",
                    time: Date.now()
                });
                input.value = "";
            }
        }

        document.getElementById("sendBtn").onclick = send;
        input.onkeypress = (e) => { if(e.key === "Enter") send(); };

        // Mesajları Canlı Göster
        sohbetRef.on("child_added", (snap) => {
            const data = snap.val();
            const div = document.createElement("div");
            div.className = "msg " + data.role;
            div.innerText = data.text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // ZEKİ BOT MANTIĞI: Bot açıksa ve kullanıcı yazdıysa
            if (botAktif && data.role === "user" && isAdmin) {
                setTimeout(() => {
                    const cevaplar = [
                        "İsteğiniz sistem tarafından analiz ediliyor.(yalan)",
                        "Şu an yüksek trafik nedeniyle gecikme yaşanıyor.(yalan)",
                        "Bu bir otomatik yanıttır: Lütfen bekleyiniz.",
                        "Kullanıcı verileri doğrulanıyor... bu nasıl veri aq.",
                        "Anlaşılamadı. Tekrar denemeyin."
                        "amq."
                        "bilmiyom"
                        "görüldü"
                    ];
                    const random = cevaplar[Math.floor(Math.random() * cevaplar.length)];
                    sohbetRef.push({ text: "[SİSTEM]: " + random, role: "bot" });
                }, 1500);
            }
        });
    </script>
</body>
</html>
