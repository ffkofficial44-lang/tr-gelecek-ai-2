<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem v8.0 - Media Support</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .user { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .admin { background: #007aff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #5856d6; align-self: flex-end; border-bottom-right-radius: 2px; font-style: italic; }
        
        /* Fotoğraf Stili */
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        .input-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2c2c2e; color: white; outline: none; }
        #sendBtn { background: #007aff; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; }
        #botBtn { position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; display: none; padding: 15px; border: none; font-weight: bold; text-align: center; color: white; }
    </style>
</head>
<body>

    <button id="botBtn">BOT KONTROL</button>
    <div id="chat"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Mesaj veya Resim Linki..." autocomplete="off">
        <button id="sendBtn">GÖNDER</button>
    </div>

    <script>
        var config = {
            apiKey: "AIzaSyAW-HC08psjB1ftH-EffGyswLRZ13O8KtY",
            databaseURL: "https://global-chat-fac7a-default-rtdb.firebaseio.com",
            projectId: "global-chat-fac7a",
            appId: "1:1058623951778:web:8e71710b3c4482071698fb"
        };
        firebase.initializeApp(config);
        var db = firebase.database();
        
        var isAdmin = window.location.hash.includes("admin");
        var botBtn = document.getElementById("botBtn");
        var chatBox = document.getElementById("chat");
        var botAktif = false;

        if(isAdmin) { botBtn.style.display = "block"; }

        db.ref("bot_kontrol").on("value", function(snap) {
            botAktif = snap.val() || false;
            botBtn.innerText = botAktif ? "🤖 BOT AKTİF" : "😴 BOT KAPALI";
            botBtn.style.background = botAktif ? "#4cd964" : "#ff3b30";
        });

        botBtn.onclick = function() { db.ref("bot_kontrol").set(!botAktif); };

        function gonder() {
            var text = document.getElementById("msgInput").value.trim();
            if(text !== "") {
                db.ref("sohbet_odasi").push({
                    msg: text,
                    role: isAdmin ? "admin" : "user",
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                document.getElementById("msgInput").value = "";
            }
        }

        document.getElementById("sendBtn").onclick = gonder;

        db.ref("sohbet_odasi").on("child_added", function(snap) {
            var data = snap.val();
            var div = document.createElement("div");
            div.className = "msg " + data.role;

            // FOTOĞRAF KONTROLÜ: Eğer mesaj http ile başlıyorsa img etiketi oluştur
            if (data.msg.startsWith("http")) {
                div.innerHTML = (data.role === "bot" ? "" : "") + `<img src="${data.msg}" alt="Görsel Yüklenemedi">`;
            } else {
                div.innerText = (data.role === "bot" ? "" : "") + data.msg;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // OTONOM BOT CEVABI
            if (botAktif && data.role === "user") {
                var simdi = Date.now();
                if (data.timestamp && (simdi - data.timestamp < 5000)) {
                    setTimeout(function() {
                        var troll = [
                            "Bane.", 
                            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxPKz8NMxkKOolHfWwcjGEgVWDSZFPT74VMUCq15hRz5PHPJR6wjysVMFD&s=10", // Örnek Troll GIF
                            "Kameran açık kalmış...",
                            "18 cm...",
                            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLGs9LNKJ28HnNfDnqDDSWOm3eng4QsHO_gB2c4ZZNCTvwJdp53N_rX-5l&s=10",
                            "https://play-lh.googleusercontent.com/ZrsPit-BgpiMdm3am82N-4XV5DJJTkf1JzWFi26F39dWX6gCBFylt3t4iL93NOYeVhM=w240-h480-rw",
                            "umrumda değil",
                            "amq",
                            "ne bilim git Chat GBT'ye sor",
                            "sistem gecikmesi oldu, sonra tekrar deneyin(yalan amq)",
                            "uhmmm...(ping yükseldiği için duymadım)",
                            "ne?(iq yetmedi)",
                            "🤔",
                            "senin o akılalmaz derecede saçma sapan kararlar verip kendi kendini rezil etme konusunda doktora yapmış gibi davranan, yaptığı hataları bile gururla savunacak kadar gerçeklikten kopmuş, mantıkla en ufak bağı kalmamış, çevresindeki insanları da bu saçmalığın içine çekmeye çalışan, gereksiz özgüvenle ortalıkta dolaşan haline bakınca insanın sabrı test ediliyor lan",
                            "(yazacak bir şey bulamadım)",
                            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxPKz8NMxkKOolHfWwcjGEgVWDSZFPT74VMUCq15hRz5PHPJR6wjysVMFD&s=10    Seni izliyorum."
                        ];
                        var secilen = troll[Math.floor(Math.random() * troll.length)];
                        db.ref("sohbet_odasi").push({
                            msg: secilen,
                            role: "bot",
                            timestamp: firebase.database.ServerValue.TIMESTAMP
                        });
                    }, 2000);
                }
            }
        });
    </script>
</body>
</html>
