<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System Interface v2.0</title>
    <style>
        :root { --bg: #0f0f0f; --msg-user: #262626; --msg-admin: #007aff; --msg-bot: #5856d6; --input: #1c1c1e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Mesaj Alanı ve Kaydırma Sorunu Çözümü */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; scroll-behavior: smooth; }
        .msg-row { display: flex; animation: slide 0.2s ease; }
        .msg-row.user { justify-content: flex-start; }
        .msg-row.admin, .msg-row.bot { justify-content: flex-end; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .msg-row.user .msg { background: var(--msg-user); border-bottom-left-radius: 4px; }
        .msg-row.admin .msg { background: var(--msg-admin); border-bottom-right-radius: 4px; }
        .msg-row.bot .msg { background: var(--msg-bot); border-bottom-right-radius: 4px; font-style: italic; }

        /* Giriş Barı */
        .input-bar { padding: 10px; background: #1c1c1e; display: flex; gap: 8px; position: fixed; bottom: 0; width: 100%; z-index: 100; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2c2c2e; color: white; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; }

        /* Sadece Adminin Göreceği Bot Paneli */
        #adminPanel { display: none; position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; z-index: 1000; border: 1px solid #444; }
        @keyframes slide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="adminPanel">
        <label style="font-size: 12px;">OTO BOT: </label>
        <button id="botToggle" style="padding: 5px 10px; font-size: 10px; background: #ff3b30;">KAPALI</button>
    </div>

    <div id="chat"></div>
    
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Sisteme mesaj gönder..." autocomplete="off">
        <button id="sendBtn">Gönder</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW-HC08psjB1ftH-EffGyswLRZ13O8KtY",
            authDomain: "global-chat-fac7a.firebaseapp.com",
            projectId: "global-chat-fac7a",
            storageBucket: "global-chat-fac7a.firebasestorage.app",
            messagingSenderId: "1058623951778",
            appId: "1:1058623951778:web:8e71710b3c4482071698fb",
            databaseURL: "https://global-chat-fac7a-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const sohbetRef = ref(db, 'sohbet_odasi');
        const botDurumRef = ref(db, 'bot_aktif');

        const isAdmin = window.location.hash === "#admin";
        if(isAdmin) document.getElementById("adminPanel").style.display = "block";

        let botAktif = false;
        onValue(botDurumRef, (snap) => {
            botAktif = snap.val();
            const btn = document.getElementById("botToggle");
            btn.innerText = botAktif ? "AÇIK" : "KAPALI";
            btn.style.background = botAktif ? "#4cd964" : "#ff3b30";
        });

        document.getElementById("botToggle").onclick = () => set(botDurumRef, !botAktif);

        function sendMessage(text, role) {
            if(text.trim() === "") return;
            push(sohbetRef, { text, role, time: Date.now() });
        }

        document.getElementById("sendBtn").onclick = () => {
            sendMessage(document.getElementById("msgInput").value, isAdmin ? "admin" : "user");
            document.getElementById("msgInput").value = "";
        };

        onChildAdded(sohbetRef, (snap) => {
            const data = snap.val();
            const row = document.createElement("div");
            row.className = "msg-row " + data.role;
            row.innerHTML = `<div class="msg">${data.text}</div>`;
            document.getElementById("chat").appendChild(row);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;

            // Bot Mantığı: Eğer bot açıksa ve mesaj kullanıcıdan geldiyse cevap ver
            if (botAktif && data.role === "user" && isAdmin) {
                setTimeout(() => {
                    const botCevaplari = [
                        "İsteğiniz işleniyor, lütfen beklemeyin.",
                        "Şu an yoğunluk nedeniyle cevap yok.(yalan)",
                        "Sistem güncelleniyor, bi 1 minisaniye sonra tekrar deneyin.",
                        "Bu mesajınız kayıt altına alınmıştır(şaka).",
                        "uhmm...(pingim yüksek ve cevap veremiyom)."
                        "Amq."
                    ];
                    const rastgele = botCevaplari[Math.floor(Math.random() * botCevaplari.length)];
                    sendMessage("[Sistem Mesajı]: " + rastgele, "bot");
                }, 2000);
            }
        });
    </script>
</body>
</html>
